name: Build macOS App

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyInstaller PySide6 Pillow

    - name: Verify macOS build environment
      run: |
        python --version
        python -c "import sys, importlib.util; print(sys.executable); print(sys.platform); print(importlib.util.find_spec('PyInstaller')); print(importlib.util.find_spec('PySide6'))"
        ls -lh app.py app.icns led-pixelmap-tool_121.html

    - name: Build macOS app and DMG
      run: python3 build_app.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UPScale-macOS-Installer
        path: |
          dist/UPScale.dmg
          dist/UPScale.app

    - name: Upload DMG to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/UPScale.dmg
        fail_on_unmatched_files: true