name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyInstaller PySide6 Pillow

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 5.*
        "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify Windows build environment
      shell: pwsh
      run: |
        python --version
        python -c "import sys, importlib.util; print(sys.executable); print(sys.platform); print(importlib.util.find_spec('PyInstaller')); print(importlib.util.find_spec('PySide6'))"
        Get-ChildItem app.py, app.ico, led-pixelmap-tool_121.html | Format-Table Name,Length
        where.exe wix
    
    - name: Build Windows installer
      shell: pwsh
      run: |
        if ("${{ github.ref_type }}" -eq "tag") {
          $version = "${{ github.ref_name }}".TrimStart("v")
        } else {
          $version = "1.0.${{ github.run_number }}"
        }
        python build_app_windows.py --version "$version"

    - name: Package portable ZIP
      shell: pwsh
      run: |
        if (Test-Path "dist/UPScale") {
          Compress-Archive -Path "dist/UPScale/*" -DestinationPath "dist/UPScale-portable.zip" -Force
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UPScale-Windows-Installer
        path: |
          dist/UPScale.msi
          dist/UPScale-portable.zip

    - name: Upload MSI to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/UPScale.msi
          dist/UPScale-portable.zip
        fail_on_unmatched_files: true
