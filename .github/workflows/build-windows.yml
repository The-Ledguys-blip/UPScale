name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyInstaller PySide6 Pillow

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 5.*
        "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify Windows build environment
      shell: pwsh
      run: |
        python --version
        python -c "import sys, importlib.util; print(sys.executable); print(sys.platform); print(importlib.util.find_spec('PyInstaller')); print(importlib.util.find_spec('PySide6'))"
        Get-ChildItem app.py, app.ico, led-pixelmap-tool_121.html | Format-Table Name,Length
        where.exe wix
    
    - name: Build Windows installer
      run: python build_app_windows.py --version 1.0.${{ github.run_number }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UPScale-Windows-Installer
        path: dist/UPScale.msi
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/UPScale.msi
        asset_name: UPScale.msi
        asset_content_type: application/x-msi
