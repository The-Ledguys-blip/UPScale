name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyInstaller PySide6 Pillow

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        dotnet tool install --global wix --version 5.*
        "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify Windows build environment
      shell: pwsh
      run: |
        python --version
        python -c "import sys, importlib.util; print(sys.executable); print(sys.platform); print(importlib.util.find_spec('PyInstaller')); print(importlib.util.find_spec('PySide6'))"
        Get-ChildItem app.py, app.ico, led-pixelmap-tool_121.html | Format-Table Name,Length
        where.exe wix
    
    - name: Build Windows installer
      run: python build_app_windows.py --version "1.0.${{ github.run_number }}"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UPScale-Windows-Installer
        path: dist/UPScale.msi
